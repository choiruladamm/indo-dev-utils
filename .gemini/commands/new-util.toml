description = "Scaffold a new utility module in packages/toolkit/src/"

prompt = """
I want to create a new utility module in `packages/toolkit/src/{{args}}`. 

### STEP 1: SCAFFOLD FILES
Please follow the project's architecture:
1. Create directory `packages/toolkit/src/{{args}}` and `packages/toolkit/src/{{args}}/__tests__`.
2. Create `index.ts` to export public APIs.
3. Create `{{args}}.ts` for core implementation.
4. Create `types.ts` for interfaces.
5. Create `constants.ts` for static constants.
6. Create `utils.ts` for internal helpers.
7. Create `__tests__/{{args}}.test.ts` with basic test cases.

Make sure to use strict TypeScript, follow the naming conventions, and add JSDoc in English.

### STEP 2: REGISTER MODULE (AUTOMATIC)
After scaffolding, you MUST update the following registration files:
1. **packages/toolkit/package.json**: Add `./{{args}}` entry to `exports`.
2. **packages/toolkit/tsup.config.ts**: Add `'{{args}}/index': 'src/{{args}}/index.ts'` to `entry`.
3. **packages/toolkit/src/index.ts**: Export the new utility from the main index.

### STEP 3: DOCUMENTATION
1. Create `docs/src/content/api/{{args}}.mdx` using the standard format.
2. Register the module in `docs/src/content/api/_meta.js`.
3. Add a new entry to `docs/src/content/changelog.mdx` under the latest version.
"""
